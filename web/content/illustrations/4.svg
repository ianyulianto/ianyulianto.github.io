    <path d="M28 8 C36 20 44 32 44 32" fill="none" stroke="#c97878" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="48" cy="22" r="2.2" fill="#c97878"/>
  </g>
  <!-- faint silhouette stance -->
  <path d="M240 148 c-10 18 -8 46 0 62 M240 148 c10 18 8 46 0 62 M240 210 v28" fill="none" stroke="#1c1a17" stroke-width="1.5" stroke-linecap="round" opacity="0.28"/>
