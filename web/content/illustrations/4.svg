<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-labelledby="t4">
  <title id="t4">Panggung kosong dan sepatu balet</title>
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3eee4"/>
      <stop offset="55%" stop-color="#e9e1d1"/>
      <stop offset="100%" stop-color="#d9d0be"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="28%" r="42%">
      <stop offset="0%" stop-color="#fff8ea" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#f3efe6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f3efe6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="320" fill="url(#sky4)"/>
  <!-- curtains hint -->
  <path d="M0 0 C40 40 40 120 0 180 Z" fill="#2f5d56" opacity="0.18"/>
  <path d="M480 0 C440 40 440 120 480 180 Z" fill="#2f5d56" opacity="0.18"/>
