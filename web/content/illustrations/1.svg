<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-labelledby="t1">
  <title id="t1">Balon, topi ulang tahun, dan pintu tertutup</title>
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f1e7"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" fill="url(#sky1)"/>
  <!-- floor -->
  <path d="M0 268 H480 V320 H0 Z" fill="#ddd4c2"/>
  <!-- closed door -->
  <rect x="268" y="78" width="118" height="190" rx="4" fill="#f3efe6" stroke="#1c1a17" stroke-width="2.2"/>
  <line x1="327" y1="78" x2="327" y2="268" stroke="#1c1a17" stroke-width="1.2" opacity="0.35"/>
  <circle cx="348" cy="172" r="3" fill="#2f5d56"/>
  <!-- note on door -->
  <rect x="292" y="118" width="54" height="36" rx="2" fill="#fffaf2" stroke="#7a7366" stroke-width="1.4"/>
  <path d="M300 130 h38 M300 138 h28 M300 146 h34" stroke="#7a7366" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <!-- balloon drifting away -->
  <g>
    <path d="M118 72 c28-42 78-38 86 8 c6 34-22 58-48 58 s-48-20-38-66z" fill="#c97878" stroke="#1c1a17" stroke-width="1.6"/>
    <path d="M156 138 l-4 10 10 2 z" fill="#1c1a17"/>
    <path d="M154 148 C136 184 174 214 154 244" fill="none" stroke="#7a7366" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <!-- wide birthday hat (few photos, shy hair) -->
  <g transform="translate(78 188)">
    <ellipse cx="42" cy="48" rx="42" ry="8" fill="#ebe4d6" stroke="#1c1a17" stroke-width="1.5"/>
    <path d="M18 48 L42 8 L66 48" fill="#c97878" stroke="#1c1a17" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="42" cy="8" r="4" fill="#e8c56d" stroke="#1c1a17" stroke-width="1.2"/>
  </g>
  <!-- brown photo envelope, still closed -->
  <g transform="translate(188 232)">
    <rect x="0" y="8" width="52" height="34" rx="2" fill="#cbb99a" stroke="#1c1a17" stroke-width="1.4"/>
    <path d="M0 8 L26 26 L52 8" fill="none" stroke="#7a7366" stroke-width="1.3" stroke-linejoin="round"/>
  </g>
  <!-- small heart pulse near threshold -->
  <path d="M230 252 c2-6 10-6 12 0 c2 6-6 12-12 18 c-6-6-14-12-12-18 c2-6 10-6 12 0" fill="#2f5d56" opacity="0.35"/>
</svg>
