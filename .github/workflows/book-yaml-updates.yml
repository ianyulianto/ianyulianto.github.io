name: Book YAML section updates

on:
  pull_request:
    paths:
      - "web/content/book.yaml"

permissions:
  contents: read
  pull-requests: write

jobs:
  mark-sections:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Diff book.yaml sections vs base
        working-directory: web
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          node scripts/book-updates-report.mjs "$BASE_SHA" | tee /tmp/book-updates.md

      - name: Comment PR with new/changed sections
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const report = fs.readFileSync("/tmp/book-updates.md", "utf8").trim();
            const body = `<!-- book-yaml-updates -->\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const marker = "<!-- book-yaml-updates -->";

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
